{% if success %}
<div class="flex items-center gap-2 p-3 bg-emerald-900/20 border border-emerald-800/50 rounded-lg text-sm text-emerald-300 htmx-added">
  <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
  </svg>
  {{ message }}
</div>
{% else %}
<div class="flex items-center gap-2 p-3 bg-red-900/20 border border-red-800/50 rounded-lg text-sm text-red-300 htmx-added">
  <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
  </svg>
  {{ message }}
</div>
{% endif %}
