<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Cassian</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"EB Garamond"', 'Georgia', 'serif'],
            sans:  ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="h-full bg-slate-950 text-slate-100 flex items-center justify-center font-sans">

  <div class="w-full max-w-sm mx-auto px-6">

    <!-- Logo -->
    <div class="text-center mb-10">
      <span class="text-amber-400 text-5xl">Θ</span>
      <h1 class="text-2xl font-semibold mt-3">Create Account</h1>
      <p class="text-sm text-slate-500 mt-1">Join Cassian</p>
    </div>

    <!-- Error message -->
    {% if error %}
    <div class="mb-6 px-4 py-3 rounded-lg bg-red-900/30 border border-red-800 text-sm text-red-300">
      {{ error }}
    </div>
    {% endif %}

    <!-- Registration Form -->
    <form method="POST" action="/register" class="space-y-4">
      <div>
        <label for="name" class="block text-xs text-slate-400 mb-1.5">Name</label>
        <input type="text" id="name" name="name" required autofocus
               class="w-full px-4 py-2.5 rounded-lg bg-slate-900 border border-slate-700
                      text-sm text-slate-100 placeholder-slate-600
                      focus:outline-none focus:border-amber-400/50 focus:ring-1 focus:ring-amber-400/30"
               placeholder="Your name" />
      </div>
      <div>
        <label for="email" class="block text-xs text-slate-400 mb-1.5">Email</label>
        <input type="email" id="email" name="email" required
               class="w-full px-4 py-2.5 rounded-lg bg-slate-900 border border-slate-700
                      text-sm text-slate-100 placeholder-slate-600
                      focus:outline-none focus:border-amber-400/50 focus:ring-1 focus:ring-amber-400/30"
               placeholder="you@example.com" />
      </div>
      <div>
        <label for="password" class="block text-xs text-slate-400 mb-1.5">Password</label>
        <input type="password" id="password" name="password" required minlength="8"
               class="w-full px-4 py-2.5 rounded-lg bg-slate-900 border border-slate-700
                      text-sm text-slate-100 placeholder-slate-600
                      focus:outline-none focus:border-amber-400/50 focus:ring-1 focus:ring-amber-400/30"
               placeholder="At least 8 characters" />
      </div>
      <div>
        <label for="password_confirm" class="block text-xs text-slate-400 mb-1.5">Confirm Password</label>
        <input type="password" id="password_confirm" name="password_confirm" required minlength="8"
               class="w-full px-4 py-2.5 rounded-lg bg-slate-900 border border-slate-700
                      text-sm text-slate-100 placeholder-slate-600
                      focus:outline-none focus:border-amber-400/50 focus:ring-1 focus:ring-amber-400/30"
               placeholder="Type it again" />
      </div>
      <button type="submit"
              class="w-full px-4 py-2.5 rounded-lg bg-amber-400 text-slate-900 font-medium text-sm
                     hover:bg-amber-300 transition-colors">
        Create Account
      </button>
    </form>

    <p class="text-center text-sm text-slate-500 mt-6">
      Already have an account?
      <a href="/login" class="text-amber-400 hover:text-amber-300">Sign in</a>
    </p>
  </div>

</body>
</html>
