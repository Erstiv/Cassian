server {
    listen 80;
    server_name planterpruner.com;

    # Static files (fonts, CSS, JS)
    location /static/ {
        alias /var/www/cassian/app/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Uploaded project files (covers, illustrations, etc.)
    location /uploads/ {
        alias /var/www/cassian/app/uploads/;
    }

    # Project data (generated covers, illustrations served by the app)
    location /projects/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → FastAPI
    location / {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # File uploads can be large (manuscript .docx, cover images)
        client_max_body_size 50M;
    }
}
